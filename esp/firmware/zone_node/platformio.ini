[platformio]
default_envs = esp32-zone-a

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.15
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.4
build_flags =
    -DCORE_DEBUG_LEVEL=3

[env:esp32-zone-a]
build_flags =
    ${env.build_flags}
    -DAPP_ZONE_PROFILE_A

[env:esp32-zone-b]
build_flags =
    ${env.build_flags}
    -DAPP_ZONE_PROFILE_B

[env:esp32-zone-c]
build_flags =
    ${env.build_flags}
    -DAPP_ZONE_PROFILE_C

; One shared source tree is reused for all zones.
; Copy src/config_local.example.h to src/config_local.h locally, fill zone credentials,
; then build the matching environment for zone A, B, or C.
; The default environment is esp32-zone-a for first real bring-up.
